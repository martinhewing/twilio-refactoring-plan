name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /app/refactoring-factory
            git pull origin main

            # Rebuild frontend
            npm ci
            npm run build

            # Sync Python deps
            uv sync --frozen --no-dev

            # Restart service
            sudo systemctl restart refactoring-factory

            # Health check
            sleep 3
            curl -f http://localhost:8394/api/health || echo "⚠ HEALTH CHECK FAILED"

      - name: Smoke test production
        run: |
          sleep 5
          curl -f https://twilio-refactoring-plan.connectaiml.com/api/health
        continue-on-error: true
